# Netlify yapılandırması — Ulukale Köyü Dijital Arşivi
# Statik site: build adımı yok, dosyalar kök dizinde.

[build]
  publish = "."

# Güvenlik ve performans başlıkları
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Statik varlıkları uzun süre önbelleğe al
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Arama/AI botları için doğru içerik tipleri
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

# netlify.app alt alan adını birincil domaine kalıcı yönlendir (301)
# Böylece ulukale.netlify.app'e gelen herkes ulukalekoyu.com'a düşer.
[[redirects]]
  from = "https://ulukale.netlify.app/*"
  to = "https://ulukalekoyu.com/:splat"
  status = 301
  force = true

# Form gönderiminden sonra teşekkür sayfası
[[redirects]]
  from = "/tesekkurler"
  to = "/tesekkurler.html"
  status = 200

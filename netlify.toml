# Netlify yapılandırması — Ulukale Köyü Dijital Arşivi
# Astro ile derlenir; çıktı dist/ klasörüne yazılır.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Güvenlik ve performans başlıkları
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Statik varlıkları uzun süre önbelleğe al
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Arama/AI botları için doğru içerik tipleri
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

# Yönetim paneli arama motorlarına kapalı
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"

# netlify.app alt alan adını birincil domaine kalıcı yönlendir (301)
[[redirects]]
  from = "https://ulukale.netlify.app/*"
  to = "https://ulukalekoyu.com/:splat"
  status = 301
  force = true
